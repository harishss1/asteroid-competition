# Asteroid Competition Environment
# These versions match the competition sandbox exactly.
# Using different versions may cause model loading failures.
name: asteroid-competition
channels:
  - conda-forge
  - pytorch
dependencies:
  - python=3.11
  # Core data science (pinned to match competition sandbox)
  - numpy=1.26.4
  - pandas=2.2.0
  - pyarrow=15.0.0
  - scipy=1.12.0
  # Machine learning
  - scikit-learn=1.4.0
  - xgboost=2.0.3
  - lightgbm=4.3.0
  - statsmodels=0.14.1
  # Deep learning (CPU only)
  - pytorch=2.2.0
  - cpuonly
  # Utilities
  - joblib=1.3.2
  # Development (optional, for exploration)
  - jupyter
  - matplotlib
  - seaborn
  # pip packages
  - pip
  - pip:
    - catboost==1.2.2
